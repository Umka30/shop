name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        run: |
          cd Frontend
          npm ci --legacy-peer-deps
      - name: Build frontend
        run: |
          cd Frontend
          npm run build
      - name: Build Docker image
        run: |
          docker build -t shop:latest .
          docker save shop:latest -o docker-image.tar
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: shop-docker-image
          path: docker-image.tar
      - name: Create deployment artifact
        run: |
          mkdir -p artifact
          cp docker-compose.yml artifact/docker-compose.yml
          cp .dockerignore artifact/.dockerignore
      - name: Upload deployment config
        uses: actions/upload-artifact@v4
        with:
          name: shop-deploy-config
          path: artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: shop-docker-image
      - name: Download deployment config
        uses: actions/download-artifact@v4
        with:
          name: shop-deploy-config
      - name: Deploy to AWS EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          DATABASE_URL: ${{ secrets.EC2_DATABASE_URL }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null || true
          
          # Copy docker image and config to EC2
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 docker-image.tar $SSH_USER@$SSH_HOST:/tmp/
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 docker-compose.yml $SSH_USER@$SSH_HOST:/home/$SSH_USER/shop/
          
          # Load image and deploy
          ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST <<'EOF'
            # Create .env file
            echo "DATABASE_URL=$DATABASE_URL" > /home/$SSH_USER/shop/.env
            
            # Load Docker image
            cd /tmp
            docker load -i docker-image.tar
            
            # Deploy with docker-compose (no rebuild needed)
            cd /home/$SSH_USER/shop
            NODE_ENV=production docker-compose up -d
            
            # Cleanup
            rm /tmp/docker-image.tar
            
            echo "Deployment completed successfully"
          EOF

