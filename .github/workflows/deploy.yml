name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=4096'
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Frontend/package-lock.json
      - name: Install frontend dependencies
        run: |
          cd Frontend
          npm ci --legacy-peer-deps
      - name: Build frontend
        run: |
          cd Frontend
          npm run build
      - name: Build Docker image
        run: |
          docker build -t shop:latest .
          docker save shop:latest -o docker-image.tar
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: shop-docker-image
          path: docker-image.tar
      - name: Create deployment artifact
        run: |
          mkdir -p artifact
          cp docker-compose.yml artifact/docker-compose.yml
          cp .dockerignore artifact/.dockerignore
      - name: Upload deployment config
        uses: actions/upload-artifact@v4
        with:
          name: shop-deploy-config
          path: artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: shop-docker-image
      - name: Download deployment config
        uses: actions/download-artifact@v4
        with:
          name: shop-deploy-config
      - name: Deploy to AWS EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_USER: ${{ secrets.EC2_USER }}
          DATABASE_URL: ${{ secrets.EC2_DATABASE_URL }}
        run: |
          set -Eeuo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_HOST"
          test -n "$SSH_USER"
          test -n "$DATABASE_URL"

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          APP_DIR="/home/$SSH_USER/shop"
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" > deploy.env

          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$SSH_USER@$SSH_HOST" "mkdir -p '$APP_DIR'"
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 docker-image.tar "$SSH_USER@$SSH_HOST:/tmp/shop-docker-image.tar"
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 docker-compose.yml "$SSH_USER@$SSH_HOST:$APP_DIR/docker-compose.yml"
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=10 deploy.env "$SSH_USER@$SSH_HOST:$APP_DIR/.env"

          ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" "APP_DIR='$APP_DIR' bash -s" <<'EOF'
            set -Eeuo pipefail

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y curl docker.io docker-compose-plugin
            elif ! command -v curl >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y curl
            fi

            sudo systemctl enable --now docker

            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              sudo apt-get update
              sudo apt-get install -y docker-compose-plugin
              COMPOSE="docker compose"
            fi

            sudo docker load -i /tmp/shop-docker-image.tar

            cd "$APP_DIR"
            sudo $COMPOSE up -d --remove-orphans
            sudo $COMPOSE ps

            for attempt in {1..30}; do
              if curl -fsS http://localhost/health >/dev/null; then
                break
              fi
              sleep 2
            done

            curl -fsS http://localhost/health
            rm -f /tmp/shop-docker-image.tar
            echo "Deployment completed successfully"
          EOF

      - name: Public smoke test
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -Eeuo pipefail
          curl -fsS --retry 6 --retry-delay 5 "http://$SSH_HOST/health"
