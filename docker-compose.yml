version: '3.9'

services:
  shop:
    image: shop:latest
    container_name: shop
    ports:
      - '127.0.0.1:4001:4001'
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:4001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
