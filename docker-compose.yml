version: '3.9'

services:
  shop:
    image: shop:latest
    ports:
      - '4001:4001'
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4001/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
